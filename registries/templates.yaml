# registries/templates.yaml
# AI Design Library Templates Registry v1.0

templates:

  dashboard_page:
    priority: advanced
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [admin_dashboard, management_console, saas, ai_platform, internal_enterprise_tools]
    composed_of:
      - page_header
      - dashboard_section
      - metric_card
      - chart_container
      - table
    description: "A standard dashboard page template with metrics, charts, and data overview."

  analytics_page:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [admin_dashboard, saas, ai_platform, e_commerce, marketplace]
    composed_of:
      - page_header
      - filter_panel
      - metric_card
      - chart_container
      - data_grid
    description: "A data analytics page template for filtering, exploring, and interpreting product metrics."

  list_page:
    priority: core
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [admin_dashboard, management_console, internal_tool, saas]
    composed_of:
      - page_header
      - table_toolbar
      - table
      - pagination
    description: "A list management page template for displaying and managing collections."

  detail_page:
    priority: core
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [admin_dashboard, management_console, customer_portal, internal_tool]
    composed_of:
      - page_header
      - card
      - key_value_row
      - activity_feed
    description: "A detail page template for displaying a single entity, metadata, and related activity."

  form_page:
    priority: core
    required: false
    maturity: [1, 2, 3, 4, 5]
    recommended_for: [admin_dashboard, management_console, responsive_web_app, mobile_app, internal_tool]
    composed_of:
      - page_header
      - form_section
      - action_group
      - alert
    description: "A form page template for creating or editing records."

  settings_page:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [admin_dashboard, management_console, saas, internal_tool]
    composed_of:
      - side_navigation
      - page_header
      - form_section
      - card
    description: "A settings page template with side navigation and grouped configuration sections."

  profile_page:
    priority: advanced
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [mobile_app, responsive_web_app, customer_portal, saas]
    composed_of:
      - page_header
      - avatar
      - form_section
      - card
    description: "A user profile page template."

  authentication_page:
    priority: core
    required: false
    maturity: [1, 2, 3, 4, 5]

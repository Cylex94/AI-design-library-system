# registries/patterns.yaml
# AI Design Library Patterns Registry v1.0

patterns:

  # =====================================================
  # Authentication
  # =====================================================

  login_pattern:
    priority: core
    required: false
    maturity: [1, 2, 3, 4, 5]
    recommended_for: [mobile_app, responsive_web_app, admin_dashboard, management_console, customer_portal, internal_tool]
    composed_of: [form_section, button, alert, empty_state]
    accessibility:
      required: true
    description: "Standard sign-in experience."

  signup_pattern:
    priority: advanced
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [mobile_app, responsive_web_app, customer_portal, saas]
    composed_of: [form_section, step_indicator, alert]
    accessibility:
      required: true
    description: "Account creation experience."

  forgot_password_pattern:
    priority: advanced
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [mobile_app, responsive_web_app, customer_portal, internal_tool]
    composed_of: [form_section, alert, toast]
    accessibility:
      required: true
    description: "Password recovery experience."

  mfa_pattern:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [banking, fintech, insurance, government, internal_enterprise_tools]
    composed_of: [form_field, action_group, alert, toast]
    accessibility:
      required: true
    description: "Multi-factor authentication experience."

  # =====================================================
  # Dashboard
  # =====================================================

  dashboard_pattern:
    priority: advanced
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [admin_dashboard, management_console, saas, ai_platform, internal_enterprise_tools]
    composed_of: [page_header, dashboard_section, metric_card, chart_container]
    accessibility:
      required: true
    description: "General dashboard layout pattern."

  analytics_dashboard_pattern:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [saas, ai_platform, e_commerce, marketplace, internal_enterprise_tools]
    composed_of: [page_header, metric_card, chart_container, filter_panel, table]
    accessibility:
      required: true
    description: "Analytics dashboard for data exploration and reporting."

  monitoring_dashboard_pattern:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [ai_platform, internal_enterprise_tools, telecommunications, healthcare]
    composed_of: [page_header, metric_card, activity_feed, timeline, alert]
    accessibility:
      required: true
    description: "Monitoring dashboard for live operational status."

  executive_dashboard_pattern:
    priority: optional
    required: false
    maturity: [4, 5]
    recommended_for: [enterprise, banking, insurance, saas, ai_platform]
    composed_of: [page_header, metric_card, chart_container, dashboard_section]
    accessibility:
      required: true
    description: "High-level executive summary dashboard."

  # =====================================================
  # CRUD / Enterprise Workflows
  # =====================================================

  list_pattern:
    priority: core
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [admin_dashboard, management_console, internal_tool, saas]
    composed_of: [page_header, table, filter_panel, pagination, action_group]
    accessibility:
      required: true
    description: "Display and manage collections of records."

  detail_pattern:
    priority: core
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [admin_dashboard, management_console, internal_tool, customer_portal]
    composed_of: [page_header, card, key_value_row, activity_feed]
    accessibility:
      required: true
    description: "Display a single record with metadata, status, and related actions."

  create_pattern:
    priority: core
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [admin_dashboard, management_console, internal_tool, saas]
    composed_of: [page_header, form_section, action_group, toast]
    accessibility:
      required: true
    description: "Create a new record or entity."

  edit_pattern:
    priority: core
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [admin_dashboard, management_console, internal_tool, saas]
    composed_of: [page_header, form_section, action_group, alert, toast]
    accessibility:
      required: true
    description: "Edit an existing record or entity."

  delete_confirmation_pattern:
    priority: core
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [admin_dashboard, management_console, internal_tool, saas]
    composed_of: [modal, alert, action_group]
    accessibility:
      required: true
    description: "Confirm destructive actions before execution."

  bulk_action_pattern:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [admin_dashboard, management_console, internal_tool, saas]
    composed_of: [table, table_toolbar, action_group, toast]
    accessibility:
      required: true
    description: "Perform actions on multiple selected records."

  # =====================================================
  # Search & Discovery
  # =====================================================

  search_results_pattern:
    priority: core
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [responsive_web_app, admin_dashboard, marketplace, e_commerce, saas]
    composed_of: [search_bar, filter_panel, list_item, pagination, empty_state]
    accessibility:
      required: true
    description: "Search and browse results with filters and pagination."

  filter_pattern:
    priority: core
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [admin_dashboard, marketplace, e_commerce, saas, internal_tool]
    composed_of: [filter_group, filter_chip_group, action_group]
    accessibility:
      required: true
    description: "Filter content or records using reusable filtering controls."

  empty_search_pattern:
    priority: core
    required: false
    maturity: [1, 2, 3, 4, 5]
    recommended_for: [responsive_web_app, admin_dashboard, marketplace, e_commerce, saas]
    composed_of: [empty_state, search_bar, action_group]
    accessibility:
      required: true
    description: "No-results experience after search or filtering."

  saved_view_pattern:
    priority: advanced
    required: false
    maturity: [4, 5]
    recommended_for: [admin_dashboard, management_console, saas, internal_enterprise_tools]
    composed_of: [filter_group, segmented_control, table_toolbar, toast]
    accessibility:
      required: true
    description: "Save, switch, and manage personalized data views."

  # =====================================================
  # Onboarding
  # =====================================================

  onboarding_pattern:
    priority: advanced
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [mobile_app, responsive_web_app, saas, ai_platform]
    composed_of: [onboarding_stepper, form_section, action_group]
    accessibility:
      required: true
    description: "Introduce users to a product or feature."

  first_time_user_pattern:
    priority: advanced
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [mobile_app, responsive_web_app, saas, ai_platform]
    composed_of: [empty_state, card, action_group]
    accessibility:
      required: true
    description: "First-use guidance before the product has user data."

  guided_setup_pattern:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [saas, ai_platform, internal_tool, management_console]
    composed_of: [onboarding_stepper, form_section, alert, toast]
    accessibility:
      required: true
    description: "Step-by-step setup for complex products."

  # =====================================================
  # Settings & Administration
  # =====================================================

  settings_pattern:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [admin_dashboard, management_console, saas, internal_tool]
    composed_of: [side_navigation, page_header, form_section, card]
    accessibility:
      required: true
    description: "General settings and preferences layout."

  account_settings_pattern:
    priority: advanced
    required: false
    maturity: [2, 3, 4, 5]
    recommended_for: [mobile_app, responsive_web_app, customer_portal, saas]
    composed_of: [page_header, form_section, card, action_group]
    accessibility:
      required: true
    description: "User account configuration."

  permissions_pattern:
    priority: advanced
    required: false
    maturity: [4, 5]
    recommended_for: [admin_dashboard, management_console, internal_enterprise_tools, government]
    composed_of: [table, filter_panel, modal, alert]
    accessibility:
      required: true
    description: "Role, permission, and access management."

  user_management_pattern:
    priority: advanced
    required: false
    maturity: [4, 5]
    recommended_for: [admin_dashboard, management_console, internal_enterprise_tools]
    composed_of: [page_header, table, filter_panel, drawer, toast]
    accessibility:
      required: true
    description: "Manage users, roles, invitations, and account status."

  # =====================================================
  # Collaboration & Review
  # =====================================================

  comments_pattern:
    priority: optional
    required: false
    maturity: [3, 4, 5]
    recommended_for: [saas, internal_tool, ai_platform]
    composed_of: [list_item, form_field, action_group]
    accessibility:
      required: true
    description: "Threaded or simple commenting experience."

  activity_pattern:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [admin_dashboard, management_console, internal_tool, saas]
    composed_of: [activity_feed, timeline, filter_group]
    accessibility:
      required: true
    description: "Activity history and event tracking."

  approval_pattern:
    priority: optional
    required: false
    maturity: [4, 5]
    recommended_for: [banking, insurance, government, internal_enterprise_tools]
    composed_of: [detail_pattern, action_group, alert, status_indicator]
    accessibility:
      required: true
    description: "Review and approve user, workflow, or content changes."

  # =====================================================
  # AI Patterns
  # =====================================================

  chat_assistant_pattern:
    priority: optional
    required: false
    maturity: [3, 4, 5]
    recommended_for: [ai_platform, saas, banking, fintech, insurance, internal_tool]
    composed_of: [ai_assistant_panel, prompt_input, suggestion_chips]
    accessibility:
      required: true
    description: "Conversational assistant experience embedded into a product."

  copilot_pattern:
    priority: optional
    required: false
    maturity: [3, 4, 5]
    recommended_for: [ai_platform, saas, internal_tool, management_console]
    composed_of: [ai_assistant_panel, source_reference_panel, human_review_badge]
    accessibility:
      required: true
    description: "Contextual AI copilot that supports users while they work."

  prompt_builder_pattern:
    priority: optional
    required: false
    maturity: [4, 5]
    recommended_for: [ai_platform, internal_tool]
    composed_of: [prompt_input, suggestion_chips, form_section, preview_panel]
    accessibility:
      required: true
    description: "Structured prompt creation and refinement experience."

  agent_management_pattern:
    priority: optional
    required: false
    maturity: [4, 5]
    recommended_for: [ai_platform, internal_tool, management_console]
    composed_of: [agent_card, table, filter_panel, status_indicator]
    accessibility:
      required: true
    description: "Manage AI agents, status, performance, and configuration."

  human_review_pattern:
    priority: optional
    required: false
    maturity: [4, 5]
    recommended_for: [ai_platform, banking, insurance, healthcare, government]
    composed_of: [source_reference_panel, human_review_badge, action_group, alert]
    accessibility:
      required: true
    description: "Human-in-the-loop review for AI-generated recommendations or outputs."

  # =====================================================
  # Data Heavy / Enterprise
  # =====================================================

  reporting_pattern:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [admin_dashboard, management_console, saas, ai_platform]
    composed_of: [page_header, filter_panel, chart_container, table]
    accessibility:
      required: true
    description: "Report viewing, filtering, and exporting experience."

  data_exploration_pattern:
    priority: advanced
    required: false
    maturity: [4, 5]
    recommended_for: [admin_dashboard, ai_platform, saas, internal_enterprise_tools]
    composed_of: [data_grid, advanced_filter, saved_views, chart_container]
    accessibility:
      required: true
    description: "Explore complex datasets with filters, views, and visual summaries."

  audit_log_pattern:
    priority: advanced
    required: false
    maturity: [4, 5]
    recommended_for: [banking, fintech, insurance, healthcare, government, internal_enterprise_tools]
    composed_of: [table, filter_panel, date_range_picker, status_indicator]
    accessibility:
      required: true
    description: "Trace system, user, or operational events."

  monitoring_pattern:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [ai_platform, telecommunications, healthcare, internal_enterprise_tools]
    composed_of: [monitoring_dashboard_pattern, alert, activity_feed]
    accessibility:
      required: true
    description: "Monitor operational health, events, and alerts."

  # =====================================================
  # Mobile
  # =====================================================

  bottom_navigation_pattern:
    priority: advanced
    required: false
    maturity: [1, 2, 3, 4, 5]
    recommended_for: [mobile_app]
    composed_of: [mobile_navigation, menu_item]
    accessibility:
      required: true
    description: "Primary bottom navigation for mobile apps."

  tab_navigation_pattern:
    priority: advanced
    required: false
    maturity: [1, 2, 3, 4, 5]
    recommended_for: [mobile_app, responsive_web_app]
    composed_of: [tab_group, mobile_navigation]
    accessibility:
      required: true
    description: "Tab-based navigation across related mobile sections."

  master_detail_pattern:
    priority: advanced
    required: false
    maturity: [3, 4, 5]
    recommended_for: [tablet, responsive_web_app, admin_dashboard]
    composed_of: [list_item, detail_pattern, side_navigation]
    accessibility:
      required: true
    description: "List-detail structure for tablet and wide responsive layouts."
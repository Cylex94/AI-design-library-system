# registries/industries/banking.yaml
# AI Design Library Banking Industry Registry v1.0

industry:
  name: banking
  version: "1.0"
  language: "en"

rules:
  industry_components_must_extend_core_library: true
  industry_components_must_not_fork_core_components: true
  industry_components_must_use_existing_tokens: true
  industry_components_must_use_auto_layout: true
  industry_components_must_include_accessibility_notes: true
  industry_components_must_include_usage_notes: true

banking_components:

  # =====================================================
  # Accounts
  # =====================================================

  account_card:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, balance_display, status_indicator, action_group]
    variants: [default, compact, detailed]
    description: "Displays a bank account with balance, account type, status, and quick actions."

  account_summary:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [metric_item, key_value_row, card]
    variants: [default, compact]
    description: "Summarizes total balance, available balance, and account count."

  account_selector:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [select, account_card]
    variants: [dropdown, sheet, modal]
    description: "Allows users to select an account for payments, transfers, or filtering."

  balance_display:
    priority: industry_specific
    required: false
    maturity: [1, 2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [text, badge]
    variants: [visible, hidden, loading]
    description: "Displays monetary balance with optional privacy masking."

  iban_display:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [text, icon_button, tooltip]
    variants: [default, copyable, masked]
    description: "Displays IBAN or account number with copy and masking behavior."

  # =====================================================
  # Transactions
  # =====================================================

  transaction_row:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [list_item, status_indicator, amount_display]
    variants: [income, expense, pending, failed, refunded]
    description: "Displays a single transaction item."

  transaction_list:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [transaction_row, filter_group, empty_state]
    variants: [grouped_by_date, flat]
    description: "Displays a list of transactions with filtering and empty states."

  transaction_detail:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [detail_pattern, key_value_row, status_indicator, action_group]
    variants: [default, dispute_available, receipt_available]
    description: "Shows detailed transaction information and related actions."

  transaction_filter:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [filter_group, date_range_picker, chip]
    variants: [compact, advanced]
    description: "Filters transactions by date, amount, status, category, or account."

  amount_display:
    priority: industry_specific
    required: false
    maturity: [1, 2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [text, badge]
    variants: [positive, negative, neutral, masked]
    description: "Displays monetary amount with semantic formatting."

  # =====================================================
  # Cards
  # =====================================================

  credit_card:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, balance_display, status_indicator, action_group]
    variants: [physical, virtual, blocked, expired]
    description: "Displays credit card information, limit, debt, and card state."

  debit_card:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, status_indicator, action_group]
    variants: [physical, virtual, blocked, expired]
    description: "Displays debit card information and status."

  card_carousel:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web]
    composed_of: [credit_card, debit_card, pagination]
    variants: [horizontal, stacked]
    description: "Displays multiple cards in a swipeable or scrollable structure."

  card_detail:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [credit_card, key_value_row, action_group, alert]
    variants: [default, security_settings, statement]
    description: "Detailed card page with card limits, transactions, and actions."

  card_limit_widget:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [progress, metric_item, key_value_row]
    variants: [available_limit, used_limit]
    description: "Displays card limit usage and available balance."

  statement_summary:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, amount_display, date_picker, action_group]
    variants: [current, previous, upcoming]
    description: "Summarizes credit card statement amount, due date, and payment action."

  # =====================================================
  # Payments & Transfers
  # =====================================================

  payment_card:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, amount_display, status_indicator, action_group]
    variants: [bill, card_payment, transfer, scheduled]
    description: "Represents a payable item or payment option."

  payment_summary:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [key_value_row, amount_display, alert]
    variants: [before_confirmation, after_confirmation]
    description: "Summarizes payment details before or after confirmation."

  payment_status:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [status_indicator, alert, action_group]
    variants: [successful, pending, failed, cancelled]
    description: "Displays payment result and next actions."

  transfer_form:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [form_section, account_selector, amount_display, action_group]
    variants: [internal, external, iban, saved_recipient]
    description: "Transfer form for account-to-account or external transfers."

  recipient_card:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [avatar, key_value_row, action_group]
    variants: [saved, recent, new]
    description: "Displays transfer recipient information."

  scheduled_payment_item:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [list_item, date_picker, status_indicator]
    variants: [active, paused, failed]
    description: "Displays a scheduled or recurring payment."

  # =====================================================
  # Campaigns & Offers
  # =====================================================

  campaign_card:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, badge, action_group]
    variants: [cashback, discount, points, partner_offer]
    description: "Displays a banking campaign or promotional offer."

  offer_card:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, badge, amount_display, action_group]
    variants: [personalized, generic, limited_time]
    description: "Displays a personalized banking offer."

  reward_card:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, progress, metric_item]
    variants: [points, cashback, tier]
    description: "Displays rewards, points, or loyalty progress."

  # =====================================================
  # Loans & Installments
  # =====================================================

  loan_card:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, amount_display, progress, action_group]
    variants: [personal_loan, mortgage, vehicle_loan]
    description: "Displays loan balance, repayment status, and next installment."

  installment_card:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, amount_display, status_indicator, date_picker]
    variants: [upcoming, paid, overdue]
    description: "Displays installment amount, date, and status."

  repayment_timeline:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [timeline, amount_display, status_indicator]
    variants: [compact, detailed]
    description: "Shows loan repayment history and future installments."

  # =====================================================
  # Investments
  # =====================================================

  portfolio_card:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, metric_item, chart_container]
    variants: [summary, detailed]
    description: "Displays investment portfolio value and change."

  asset_card:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, amount_display, status_indicator, metric_item]
    variants: [stock, fund, crypto, fx, gold]
    description: "Displays a single investment asset."

  investment_summary:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [metric_card, chart_container, list_item]
    variants: [compact, detailed]
    description: "Summarizes investments, performance, and allocation."

  # =====================================================
  # Security & Trust
  # =====================================================

  security_status_card:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, status_indicator, action_group, alert]
    variants: [secure, warning, risk]
    description: "Displays account or device security status."

  verification_step:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [step_indicator, form_field, alert]
    variants: [sms, email, biometric, app_approval]
    description: "Verification step for secure banking operations."

  fraud_alert_card:
    priority: industry_specific
    required: false
    maturity: [4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [alert, transaction_row, action_group]
    variants: [suspected, confirmed, resolved]
    description: "Displays suspicious transaction or fraud-related warning."

  # =====================================================
  # AI Banking
  # =====================================================

  upcoming_payment_reminder:
    priority: industry_specific
    required: false
    maturity: [4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [alert, payment_card, action_group]
    variants: [card_statement, bill, loan_installment]
    description: "Proactive AI reminder for upcoming financial obligations."

  card_due_reminder:
    priority: industry_specific
    required: false
    maturity: [4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [statement_summary, alert, action_group]
    variants: [due_today, due_tomorrow, overdue]
    description: "Reminder for credit card due dates and payment actions."

  recommended_action_card:
    priority: industry_specific
    required: false
    maturity: [4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, ai_generated_badge, action_group]
    variants: [save_money, pay_now, review_spending, increase_limit]
    description: "AI-generated recommended financial action."

  financial_insight_card:
    priority: industry_specific
    required: false
    maturity: [4, 5]
    platforms: [mobile, responsive_web, desktop]
    composed_of: [card, confidence_score, chart_container, source_reference]
    variants: [spending, saving, risk, opportunity]
    description: "AI-supported financial insight with confidence and sources."

banking_patterns:

  account_overview_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [account_summary, account_card, transaction_list]
    description: "Overview of accounts, balances, and recent transactions."

  card_management_pattern:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [card_carousel, card_detail, card_limit_widget, statement_summary]
    description: "Manage cards, limits, statements, and card actions."

  payment_confirmation_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [payment_summary, verification_step, payment_status]
    description: "Review, verify, and confirm a banking payment."

  transaction_exploration_pattern:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [transaction_filter, transaction_list, transaction_detail]
    description: "Explore, filter, and inspect transactions."

  ai_payment_assistance_pattern:
    priority: industry_specific
    required: false
    maturity: [4, 5]
    composed_of: [upcoming_payment_reminder, ai_assistant_panel, payment_card, payment_status]
    description: "AI-assisted payment reminder and completion flow."
# registries/industries/mobility.yaml
# AI Design Library Mobility Industry Registry v1.0

industry:
  name: "mobility"
  version: "1.0"
  language: "en"
  description: "Industry-specific components, patterns, and templates for mobility, ride, rental, fleet, and super app products."

rules:
  industry_components_must_extend_core_library: true
  industry_components_must_not_fork_core_components: true
  industry_components_must_use_existing_tokens: true
  industry_components_must_use_auto_layout: true
  industry_components_must_include_accessibility_notes: true
  industry_components_must_include_usage_notes: true
  industry_components_must_be_documented: true

component_groups:

  vehicles:
    description: "Vehicle discovery, status, detail, and availability components."

    components:
      vehicle_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, status_indicator, action_group, metric_item]
        variants: [scooter, bike, moped, car, taxi, available, reserved, unavailable]
        accessibility:
          required: true
        description: "Displays a vehicle with type, availability, distance, battery, and quick actions."

      vehicle_detail:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [vehicle_card, key_value_row, action_group, alert]
        variants: [scooter, bike, moped, car, taxi]
        accessibility:
          required: true
        description: "Detailed vehicle view with status, pricing, location, and actions."

      vehicle_status:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [status_indicator, badge]
        variants: [available, reserved, in_use, low_battery, maintenance, offline]
        accessibility:
          required: true
        description: "Displays operational or availability status of a vehicle."

      vehicle_battery_status:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [progress, metric_item, status_indicator]
        variants: [high, medium, low, critical, charging]
        accessibility:
          required: true
        description: "Displays battery level and related state."

      vehicle_selector:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [segmented_control, vehicle_card]
        variants: [type_filter, availability_filter]
        accessibility:
          required: true
        description: "Allows users to select vehicle type or availability filters."

  trips:
    description: "Trip state, history, tracking, and summary components."

    components:
      trip_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, route_summary, amount_display, status_indicator]
        variants: [active, completed, cancelled, failed]
        accessibility:
          required: true
        description: "Displays a trip with route, duration, cost, and status."

      trip_summary:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [key_value_row, amount_display, route_summary]
        variants: [before_start, active, completed]
        accessibility:
          required: true
        description: "Summarizes trip distance, duration, route, and cost."

      trip_timeline:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [timeline, status_indicator, list_item]
        variants: [compact, detailed]
        accessibility:
          required: true
        description: "Displays trip events such as unlock, pause, resume, and end."

      trip_history_item:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [list_item, amount_display, status_indicator]
        variants: [completed, cancelled, refunded]
        accessibility:
          required: true
        description: "Displays a past trip item."

      trip_status:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [status_indicator, alert]
        variants: [not_started, active, paused, ending, completed, failed]
        accessibility:
          required: true
        description: "Displays current trip state and possible next action."

  booking:
    description: "Reservation, unlock, booking, and active ride components."

    components:
      reservation_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, vehicle_card, countdown_timer, action_group]
        variants: [active, expiring, expired, cancelled]
        accessibility:
          required: true
        description: "Displays a reserved vehicle and remaining reservation time."

      reservation_status:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [status_indicator, alert]
        variants: [reserved, expiring, expired, cancelled]
        accessibility:
          required: true
        description: "Displays reservation status."

      reservation_summary:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [key_value_row, vehicle_card, action_group]
        variants: [before_confirmation, confirmed]
        accessibility:
          required: true
        description: "Summarizes reservation details before or after confirmation."

      unlock_vehicle_panel:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile]
        composed_of: [vehicle_card, action_group, alert]
        variants: [qr, bluetooth, remote_unlock, error]
        accessibility:
          required: true
        description: "Vehicle unlock flow panel."

      active_trip_panel:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile]
        composed_of: [trip_status, trip_summary, action_group, alert]
        variants: [active, paused, ending]
        accessibility:
          required: true
        description: "Active trip control panel."

  maps_location:
    description: "Map overlays, nearby vehicles, route, and location components."

    components:
      nearby_vehicle_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [vehicle_card, route_summary, action_group]
        variants: [nearest, recommended, low_cost, premium]
        accessibility:
          required: true
        description: "Displays a nearby vehicle with route and estimated walking time."

      map_action_sheet:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile]
        composed_of: [drawer, vehicle_card, action_group]
        variants: [collapsed, half, expanded]
        accessibility:
          required: true
        description: "Bottom sheet overlay for map-based actions."

      route_summary:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [key_value_row, icon, metric_item]
        variants: [walking, riding, driving, multimodal]
        accessibility:
          required: true
        description: "Displays route distance, time, and mode."

      destination_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, search_bar, key_value_row, action_group]
        variants: [selected, recent, favorite]
        accessibility:
          required: true
        description: "Displays selected destination or destination search result."

      location_picker:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [search_bar, list_item, map_action_sheet]
        variants: [pickup, dropoff, destination]
        accessibility:
          required: true
        description: "Location selection pattern for pickup, dropoff, or destination."

  wallet_payments:
    description: "Ride wallet, ride credits, promo, cost breakdown, and receipt components."

    components:
      ride_wallet_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, amount_display, action_group]
        variants: [default, low_balance, frozen]
        accessibility:
          required: true
        description: "Displays mobility wallet balance and actions."

      ride_credit_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, amount_display, progress]
        variants: [available, expiring, used]
        accessibility:
          required: true
        description: "Displays credits or ride balance."

      promo_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, badge, action_group]
        variants: [discount, free_unlock, cashback, referral]
        accessibility:
          required: true
        description: "Displays ride promotions and campaign offers."

      ride_cost_breakdown:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [key_value_row, amount_display, tooltip]
        variants: [before_trip, after_trip]
        accessibility:
          required: true
        description: "Displays unlock fee, duration fee, discount, tax, and total cost."

      ride_receipt:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, trip_summary, ride_cost_breakdown, action_group]
        variants: [completed, refunded, failed]
        accessibility:
          required: true
        description: "Displays ride receipt and payment result."

  fleet_operations:
    description: "Fleet, maintenance, vehicle health, and operations dashboard components."

    components:
      fleet_vehicle_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [desktop, responsive_web, admin_dashboard]
        composed_of: [card, vehicle_status, vehicle_battery_status, action_group]
        variants: [available, in_use, maintenance, offline]
        accessibility:
          required: true
        description: "Displays operational state of a fleet vehicle."

      maintenance_status:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [desktop, responsive_web, admin_dashboard]
        composed_of: [status_indicator, alert, key_value_row]
        variants: [healthy, attention_needed, critical, scheduled]
        accessibility:
          required: true
        description: "Displays maintenance status."

      vehicle_health_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [desktop, responsive_web, admin_dashboard]
        composed_of: [card, metric_item, status_indicator, chart_container]
        variants: [battery, lock, gps, motor, sensor]
        accessibility:
          required: true
        description: "Displays vehicle health signals and diagnostics."

      battery_status_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [desktop, responsive_web, admin_dashboard]
        composed_of: [card, progress, metric_item, status_indicator]
        variants: [charging, low, critical, healthy]
        accessibility:
          required: true
        description: "Displays battery status across individual or fleet-level views."

  rewards_loyalty:
    description: "Loyalty, achievements, membership, and ride streak components."

    components:
      ride_streak_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, progress, badge]
        variants: [active, broken, completed]
        accessibility:
          required: true
        description: "Displays ride streak progress."

      achievement_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, badge, progress]
        variants: [locked, unlocked, claimed]
        accessibility:
          required: true
        description: "Displays mobility achievements or gamification milestones."

      membership_tier_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, progress, badge, metric_item]
        variants: [standard, silver, gold, platinum]
        accessibility:
          required: true
        description: "Displays membership tier and benefits."

  ai_mobility:
    description: "AI-assisted mobility recommendations, routing, demand, and operational insights."

    components:
      suggested_route_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, route_summary, ai_generated_badge, action_group]
        variants: [fastest, cheapest, safest, low_emission]
        accessibility:
          required: true
        description: "AI-suggested route based on user context."

      suggested_vehicle_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [vehicle_card, confidence_score, ai_generated_badge]
        variants: [nearest, best_value, best_battery, recommended]
        accessibility:
          required: true
        description: "AI-suggested vehicle recommendation."

      demand_alert_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [desktop, responsive_web, admin_dashboard]
        composed_of: [alert, chart_container, confidence_score]
        variants: [low_demand, high_demand, surge, redistribution_needed]
        accessibility:
          required: true
        description: "Operational demand alert."

      weather_impact_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [mobile, responsive_web, admin_dashboard]
        composed_of: [alert, source_reference, action_group]
        variants: [rain, snow, wind, heat]
        accessibility:
          required: true
        description: "Weather-based mobility impact alert."

      mobility_insight_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [desktop, responsive_web, admin_dashboard]
        composed_of: [card, chart_container, confidence_score, source_reference]
        variants: [usage, demand, fleet_health, revenue]
        accessibility:
          required: true
        description: "AI-supported mobility insight."

patterns:
  ride_discovery_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [vehicle_selector, nearby_vehicle_card, map_action_sheet, destination_card]
    accessibility:
      required: true
    description: "Discover nearby vehicles and choose a ride option."

  vehicle_unlock_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [vehicle_detail, unlock_vehicle_panel, reservation_status, alert]
    accessibility:
      required: true
    description: "Reserve, approach, and unlock a vehicle."

  trip_tracking_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [active_trip_panel, trip_summary, route_summary, trip_status]
    accessibility:
      required: true
    description: "Track an active mobility trip."

  ride_payment_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [ride_cost_breakdown, ride_receipt, ride_wallet_card, payment_status]
    accessibility:
      required: true
    description: "Review cost, pay, and receive trip receipt."

  fleet_monitoring_pattern:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [fleet_vehicle_card, vehicle_health_card, battery_status_card, demand_alert_card]
    accessibility:
      required: true
    description: "Monitor fleet health, demand, and operations."

  ai_mobility_assistant_pattern:
    priority: industry_specific
    required: false
    maturity: [4, 5]
    composed_of: [suggested_route_card, suggested_vehicle_card, ai_assistant_panel, mobility_insight_card]
    accessibility:
      required: true
    description: "AI-assisted route, vehicle, and mobility decision experience."

templates:
  mobility_home_page:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [nearby_vehicle_card, map_action_sheet, ride_wallet_card, promo_card]
    accessibility:
      required: true
    description: "Mobile-first home page for discovering vehicles and starting rides."

  map_experience_page:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [map_action_sheet, nearby_vehicle_card, location_picker, route_summary]
    accessibility:
      required: true
    description: "Map-centered experience with discovery and route actions."

  vehicle_detail_page:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [vehicle_detail, vehicle_battery_status, ride_cost_breakdown, action_group]
    accessibility:
      required: true
    description: "Vehicle detail page before reservation or unlock."

  active_trip_page:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [active_trip_panel, trip_summary, route_summary, trip_status]
    accessibility:
      required: true
    description: "Active ride control and tracking page."

  ride_history_page:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [trip_history_item, transaction_filter, ride_receipt]
    accessibility:
      required: true
    description: "Past trips, receipts, and ride details."

  fleet_dashboard_page:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [page_header, metric_card, fleet_vehicle_card, vehicle_health_card, demand_alert_card]
    accessibility:
      required: true
    description: "Operational dashboard for mobility fleet monitoring."
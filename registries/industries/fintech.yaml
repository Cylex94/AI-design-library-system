# registries/industries/fintech.yaml
# AI Design Library Fintech Industry Registry v1.0

industry:
  name: "fintech"
  version: "1.0"
  language: "en"
  description: "Industry-specific components, patterns, and templates for fintech, wallet, payment, investment, and digital finance products."

rules:
  industry_components_must_extend_core_library: true
  industry_components_must_not_fork_core_components: true
  industry_components_must_use_existing_tokens: true
  industry_components_must_use_auto_layout: true
  industry_components_must_include_accessibility_notes: true
  industry_components_must_include_usage_notes: true
  industry_components_must_be_documented: true

component_groups:

  wallet:
    description: "Wallet balance, wallet selection, stored value, and account-like fintech components."

    components:
      wallet_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, amount_display, status_indicator, action_group]
        variants: [default, compact, detailed, frozen]
        accessibility:
          required: true
        description: "Displays wallet balance, status, currency, and quick actions."

      balance_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, amount_display, metric_item]
        variants: [available, pending, reserved, hidden]
        accessibility:
          required: true
        description: "Displays available, pending, or reserved balance."

      wallet_selector:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [select, wallet_card]
        variants: [dropdown, sheet, modal]
        accessibility:
          required: true
        description: "Allows users to select between wallets, currencies, or balances."

      currency_balance_row:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [list_item, amount_display, status_indicator]
        variants: [fiat, crypto, reward, locked]
        accessibility:
          required: true
        description: "Displays a single currency or asset balance row."

  payments:
    description: "Payment creation, QR payment, payment request, and confirmation components."

    components:
      qr_payment_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, icon, amount_display, action_group]
        variants: [scan, generate, expired, completed]
        accessibility:
          required: true
        description: "QR payment entry or confirmation component."

      payment_request_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, recipient_card, amount_display, action_group]
        variants: [incoming, outgoing, pending, accepted, rejected]
        accessibility:
          required: true
        description: "Displays a payment request between users or entities."

      split_payment_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web]
        composed_of: [card, avatar, amount_display, action_group]
        variants: [equal, custom, pending, settled]
        accessibility:
          required: true
        description: "Displays split payment information and participant status."

      payment_confirmation:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [payment_summary, verification_step, action_group]
        variants: [before_confirmation, completed, failed]
        accessibility:
          required: true
        description: "Confirms payment details before execution or displays result."

      payment_method_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, icon, status_indicator, action_group]
        variants: [card, wallet, bank_account, qr, default, expired]
        accessibility:
          required: true
        description: "Displays a saved or selectable payment method."

  money_movement:
    description: "Transfer, recipient, remittance, and transaction flow components."

    components:
      transfer_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, amount_display, recipient_card, status_indicator]
        variants: [internal, external, international, scheduled]
        accessibility:
          required: true
        description: "Displays a money transfer item or summary."

      recipient_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [avatar, key_value_row, action_group]
        variants: [saved, recent, new, verified]
        accessibility:
          required: true
        description: "Displays a transfer recipient or payee."

      transfer_summary:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [key_value_row, amount_display, alert]
        variants: [before_confirmation, after_confirmation]
        accessibility:
          required: true
        description: "Summarizes transfer amount, fees, recipient, and timing."

      fee_breakdown:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [key_value_row, tooltip, amount_display]
        variants: [compact, detailed]
        accessibility:
          required: true
        description: "Displays transfer, exchange, or service fee breakdown."

      exchange_rate_display:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [key_value_row, badge, tooltip]
        variants: [live, fixed, expired]
        accessibility:
          required: true
        description: "Displays currency exchange rate and rate status."

  cards:
    description: "Digital, virtual, prepaid, and fintech card components."

    components:
      virtual_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, status_indicator, action_group]
        variants: [active, frozen, expired, single_use]
        accessibility:
          required: true
        description: "Displays a virtual card and related actions."

      prepaid_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, balance_card, action_group]
        variants: [active, inactive, blocked]
        accessibility:
          required: true
        description: "Displays a prepaid card with balance and state."

      card_security_panel:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [form_section, switch, alert, action_group]
        variants: [online_payments, contactless, international, freeze_card]
        accessibility:
          required: true
        description: "Controls card security settings."

  crypto:
    description: "Crypto asset, market, portfolio, and transaction components."

    components:
      crypto_asset_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, amount_display, metric_item, chart_container]
        variants: [coin, token, stablecoin]
        accessibility:
          required: true
        description: "Displays a crypto asset with value, change, and balance."

      crypto_portfolio_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, metric_item, chart_container]
        variants: [summary, allocation, performance]
        accessibility:
          required: true
        description: "Displays crypto portfolio value, distribution, and change."

      market_row:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [list_item, amount_display, metric_item]
        variants: [gainer, loser, neutral, watchlisted]
        accessibility:
          required: true
        description: "Displays a market item with current price and change."

      crypto_transaction_row:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [list_item, status_indicator, amount_display]
        variants: [buy, sell, send, receive, pending, failed]
        accessibility:
          required: true
        description: "Displays a crypto transaction row."

  rewards:
    description: "Cashback, points, loyalty, and reward tier components."

    components:
      cashback_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, amount_display, progress, action_group]
        variants: [earned, pending, redeemable]
        accessibility:
          required: true
        description: "Displays cashback status and redemption actions."

      points_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, metric_item, progress, action_group]
        variants: [earned, expiring, redeemable]
        accessibility:
          required: true
        description: "Displays loyalty points and related actions."

      tier_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, progress, badge, metric_item]
        variants: [basic, silver, gold, platinum]
        accessibility:
          required: true
        description: "Displays loyalty or membership tier progress."

  compliance_security:
    description: "KYC, verification, limits, compliance, and risk components."

    components:
      kyc_status_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, status_indicator, action_group, alert]
        variants: [not_started, pending, verified, rejected]
        accessibility:
          required: true
        description: "Displays KYC verification state and required actions."

      limit_status_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, progress, amount_display, alert]
        variants: [daily, monthly, transaction, remaining]
        accessibility:
          required: true
        description: "Displays transaction or wallet limit usage."

      risk_review_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [desktop, responsive_web, admin_dashboard]
        composed_of: [card, status_indicator, confidence_score, action_group]
        variants: [low, medium, high, blocked]
        accessibility:
          required: true
        description: "Displays risk evaluation result for transactions or users."

  ai_fintech:
    description: "AI-assisted fintech recommendations, risk, spending insights, and automation."

    components:
      spending_insight_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, ai_generated_badge, chart_container, action_group]
        variants: [category, trend, anomaly, saving_opportunity]
        accessibility:
          required: true
        description: "AI-generated insight about spending behavior."

      smart_budget_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, progress, confidence_score, action_group]
        variants: [on_track, warning, exceeded, suggested]
        accessibility:
          required: true
        description: "AI-supported budget tracking and recommendation."

      fraud_signal_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [alert, confidence_score, source_reference, action_group]
        variants: [suspected, confirmed, resolved]
        accessibility:
          required: true
        description: "AI-assisted fraud or suspicious activity signal."

patterns:
  wallet_overview_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [wallet_card, balance_card, currency_balance_row, transaction_list]
    accessibility:
      required: true
    description: "Overview of wallet balances, currencies, and recent activity."

  payment_flow_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [payment_method_card, payment_confirmation, verification_step, payment_status]
    accessibility:
      required: true
    description: "Select method, confirm, verify, and complete payment."

  transfer_flow_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [recipient_card, transfer_summary, fee_breakdown, verification_step]
    accessibility:
      required: true
    description: "Transfer money to a recipient with confirmation and verification."

  crypto_portfolio_pattern:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [crypto_portfolio_card, crypto_asset_card, market_row, crypto_transaction_row]
    accessibility:
      required: true
    description: "View crypto portfolio, assets, market rows, and transactions."

  kyc_onboarding_pattern:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [kyc_status_card, document_upload, step_indicator, alert]
    accessibility:
      required: true
    description: "Guide users through KYC verification."

  ai_money_assistant_pattern:
    priority: industry_specific
    required: false
    maturity: [4, 5]
    composed_of: [spending_insight_card, smart_budget_card, ai_assistant_panel, recommended_action_card]
    accessibility:
      required: true
    description: "AI-assisted financial management and recommendation experience."

templates:
  fintech_home_page:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [wallet_card, balance_card, payment_request_card, transaction_list]
    accessibility:
      required: true
    description: "Fintech home page with wallet balance, requests, and activity."

  wallet_detail_page:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [wallet_card, currency_balance_row, transaction_filter, transaction_list]
    accessibility:
      required: true
    description: "Wallet detail page with balances and transaction history."

  payment_confirmation_page:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [payment_confirmation, transfer_summary, fee_breakdown, verification_step]
    accessibility:
      required: true
    description: "Payment or transfer confirmation page."

  crypto_portfolio_page:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [crypto_portfolio_card, crypto_asset_card, market_row, chart_container]
    accessibility:
      required: true
    description: "Crypto portfolio and market monitoring page."
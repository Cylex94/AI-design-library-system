# registries/molecules.yaml
# AI Design Library Molecules Registry v1.0

molecules:
  form_field:
    priority: core
    required: true
    maturity: [1, 2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [label, helper_text, error_message, input]
    variants: [size, state, theme, density]
    description: "A complete form field structure with label, input, helper text, and error message."

  search_bar:
    priority: core
    required: true
    maturity: [1, 2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [input, icon_button]
    variants: [size, state, theme, density]
    description: "A search input pattern with optional icon, clear action, and submit behavior."

  segmented_control:
    priority: core
    required: true
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [button]
    variants: [size, state, theme, density]
    description: "A compact group of mutually exclusive options used for switching views or modes."

  breadcrumb:
    priority: core
    required: true
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, admin_dashboard]
    includes: [text, icon]
    variants: [size, theme]
    description: "A navigation aid that shows the user’s location within a hierarchy."

  pagination:
    priority: core
    required: true
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, admin_dashboard]
    includes: [button, icon_button]
    variants: [size, state, theme, density]
    description: "A control group for navigating through paginated content."

  status_indicator:
    priority: core
    required: true
    maturity: [1, 2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [badge, icon]
    variants: [type, size, state, theme]
    description: "A compact status display using icon, color, and label."

  action_group:
    priority: core
    required: true
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [button, icon_button]
    variants: [layout, size, density]
    description: "A grouped set of related actions such as primary, secondary, and tertiary actions."

  input_group:
    priority: core
    required: true
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [input, button, icon_button]
    variants: [size, state, theme, density]
    description: "A compound input structure with prefix, suffix, icon, or action."

  select_group:
    priority: core
    required: true
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [select, label, helper_text]
    variants: [size, state, theme, density]
    description: "A select control wrapped with label, helper text, and validation messaging."

  checkbox_group:
    priority: core
    required: true
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [checkbox, label, helper_text]
    variants: [layout, state, theme, density]
    description: "A group of related checkbox options."

  radio_group:
    priority: core
    required: true
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [radio, label, helper_text]
    variants: [layout, state, theme, density]
    description: "A group of mutually exclusive radio options."

  toggle_group:
    priority: core
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [switch, label, helper_text]
    variants: [layout, state, theme, density]
    description: "A grouped switch/toggle control with label and supporting text."

  tab_group:
    priority: core
    required: true
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [button, text, icon]
    variants: [type, size, state, theme, density, layout]
    description: "A horizontal or vertical group of tabs used to switch between related content sections."

  filter_chip_group:
    priority: advanced
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]
    includes: [chip]
    variants: [type, state, theme, layout]
    description: "A group of chips used for active filters, quick filters, or selected criteria."

  date_picker:
    priority: advanced
    required: false
    maturity: [2, 3, 4, 5]
    platforms: [desktop, responsive_web, tablet, mobile, admin_dashboard]

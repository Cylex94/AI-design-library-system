# registries/industries/government.yaml
# AI Design Library Government Industry Registry v1.0

industry:
  name: "government"
  version: "1.0"
  language: "en"
  description: "Industry-specific components, patterns, and templates for public services, citizen portals, digital government, municipality, and administrative systems."

rules:
  industry_components_must_extend_core_library: true
  industry_components_must_not_fork_core_components: true
  industry_components_must_use_existing_tokens: true
  industry_components_must_use_auto_layout: true
  industry_components_must_include_accessibility_notes: true
  industry_components_must_include_usage_notes: true
  industry_components_must_be_documented: true

component_groups:

  citizen_services:
    description: "Citizen-facing applications, requests, services, and application tracking."

    components:
      service_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, icon, action_group]
        variants: [popular, recommended, recent, mandatory]
        accessibility:
          required: true
        description: "Represents a government service available to citizens."

      application_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, status_indicator, key_value_row, action_group]
        variants: [draft, submitted, reviewing, approved, rejected]
        accessibility:
          required: true
        description: "Displays a citizen application and its current status."

      case_status_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [status_indicator, card, timeline]
        variants: [submitted, in_progress, completed, cancelled]
        accessibility:
          required: true
        description: "Displays status of a citizen case or request."

      service_category_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, icon, badge]
        variants: [education, health, tax, municipality, justice, custom]
        accessibility:
          required: true
        description: "Groups related government services."

  identity_verification:
    description: "Identity, authentication, verification, and authorization components."

    components:
      identity_verification_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, status_indicator, action_group]
        variants: [not_started, pending, verified, failed]
        accessibility:
          required: true
        description: "Identity verification status and next steps."

      document_verification_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, file_upload, status_indicator]
        variants: [pending, approved, rejected, resubmission_required]
        accessibility:
          required: true
        description: "Verification of uploaded documents."

      authorization_scope_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [desktop, responsive_web]
        composed_of: [card, badge, tooltip]
        variants: [citizen, employee, manager, administrator]
        accessibility:
          required: true
        description: "Displays user authorization scope."

  documents_records:
    description: "Documents, records, certificates, archives, and official paperwork."

    components:
      document_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, icon, action_group, badge]
        variants: [certificate, permit, report, license, official_letter]
        accessibility:
          required: true
        description: "Displays an official document."

      document_request_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, status_indicator, action_group]
        variants: [new, processing, ready, delivered]
        accessibility:
          required: true
        description: "Request and track official documents."

      archive_record_item:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [desktop, responsive_web]
        composed_of: [table_row, badge, action_group]
        variants: [active, archived, restricted]
        accessibility:
          required: true
        description: "Displays an archived government record."

      certificate_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, badge, action_group]
        variants: [valid, expiring, expired]
        accessibility:
          required: true
        description: "Displays an official certificate."

  workflows_approvals:
    description: "Approval processes, case management, and workflow tracking."

    components:
      approval_queue_item:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [desktop, responsive_web, admin_dashboard]
        composed_of: [list_item, status_indicator, action_group]
        variants: [pending, approved, rejected, escalated]
        accessibility:
          required: true
        description: "Represents an item waiting for review or approval."

      case_timeline:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [desktop, responsive_web, mobile]
        composed_of: [timeline, status_indicator]
        variants: [compact, detailed]
        accessibility:
          required: true
        description: "Displays lifecycle of a government case."

      workflow_step_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [desktop, responsive_web]
        composed_of: [step_indicator, status_indicator, action_group]
        variants: [pending, active, completed, blocked]
        accessibility:
          required: true
        description: "Represents a workflow step."

      department_assignment_card:
        priority: industry_specific
        required: false
        maturity: [3, 4, 5]
        platforms: [desktop, responsive_web]
        composed_of: [card, avatar, status_indicator]
        variants: [assigned, transferred, unassigned]
        accessibility:
          required: true
        description: "Displays department responsibility and ownership."

  public_communication:
    description: "Announcements, alerts, notices, and citizen communication."

    components:
      public_notice_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [alert, action_group]
        variants: [information, warning, emergency]
        accessibility:
          required: true
        description: "Displays public notices and alerts."

      announcement_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, badge, action_group]
        variants: [general, regional, urgent]
        accessibility:
          required: true
        description: "Displays government announcements."

      citizen_message_card:
        priority: industry_specific
        required: false
        maturity: [2, 3, 4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, status_indicator, action_group]
        variants: [sent, delivered, read]
        accessibility:
          required: true
        description: "Displays citizen communication messages."

  ai_government:
    description: "AI-assisted public services and citizen guidance."

    components:
      service_recommendation_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, ai_generated_badge, confidence_score, action_group]
        variants: [recommended, required, related]
        accessibility:
          required: true
        description: "AI recommends relevant government services."

      citizen_assistant_panel:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [ai_assistant_panel, suggestion_chips, source_reference]
        variants: [service_help, application_help, document_help]
        accessibility:
          required: true
        description: "AI-powered citizen assistant."

      application_guidance_card:
        priority: industry_specific
        required: false
        maturity: [4, 5]
        platforms: [mobile, responsive_web, desktop]
        composed_of: [card, ai_generated_badge, confidence_score]
        variants: [next_step, missing_document, estimated_completion]
        accessibility:
          required: true
        description: "Provides AI guidance for completing applications."

patterns:
  service_discovery_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [service_category_card, service_card, search_bar]
    accessibility:
      required: true
    description: "Browse and discover public services."

  application_tracking_pattern:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [application_card, case_status_card, case_timeline]
    accessibility:
      required: true
    description: "Track government applications and cases."

  identity_verification_pattern:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [identity_verification_card, document_verification_card]
    accessibility:
      required: true
    description: "Verify identity and documents."

  approval_workflow_pattern:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [approval_queue_item, workflow_step_card, department_assignment_card]
    accessibility:
      required: true
    description: "Government approval and workflow management."

  ai_citizen_assistance_pattern:
    priority: industry_specific
    required: false
    maturity: [4, 5]
    composed_of: [citizen_assistant_panel, service_recommendation_card, application_guidance_card]
    accessibility:
      required: true
    description: "AI-assisted citizen support experience."

templates:
  citizen_portal_home_page:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [service_card, application_card, public_notice_card]
    accessibility:
      required: true
    description: "Citizen portal home page."

  service_detail_page:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [service_card, document_request_card, application_guidance_card]
    accessibility:
      required: true
    description: "Government service detail page."

  application_tracking_page:
    priority: industry_specific
    required: false
    maturity: [2, 3, 4, 5]
    composed_of: [application_card, case_status_card, case_timeline]
    accessibility:
      required: true
    description: "Application tracking page."

  employee_workflow_dashboard:
    priority: industry_specific
    required: false
    maturity: [3, 4, 5]
    composed_of: [approval_queue_item, workflow_step_card, department_assignment_card]
    accessibility:
      required: true
    description: "Internal government workflow dashboard."

  ai_citizen_assistant_page:
    priority: industry_specific
    required: false
    maturity: [4, 5]
    composed_of: [citizen_assistant_panel, service_recommendation_card, application_guidance_card]
    accessibility:
      required: true
    description: "AI-powered citizen assistance page."
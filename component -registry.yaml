# component-registry.yaml
# AI Design Library Component Registry v1.1

registry:
  version: "1.1"
  language: "en"
  methodology: "atomic_design"
  generation_strategy: "core_first"
  scalable_registry: true

description:
  purpose: "Defines how Codex should discover, select, generate, document, and audit Figma design library components."
  principle: "Do not generate everything by default. Generate the smallest scalable library required by the project."

source_files:
  foundations: "./registries/foundations.yaml"
  atoms: "./registries/atoms.yaml"
  molecules: "./registries/molecules.yaml"
  organisms: "./registries/organisms.yaml"
  patterns: "./registries/patterns.yaml"
  templates: "./registries/templates.yaml"
  ai_components: "./registries/ai-components.yaml"

industry_files:
  banking: "./registries/industries/banking.yaml"
  insurance: "./registries/industries/insurance.yaml"
  marketplace: "./registries/industries/marketplace.yaml"
  mobility: "./registries/industries/mobility.yaml"

rules:
  ai_must_generate_core_first: true
  ai_must_not_generate_everything_by_default: true
  ai_must_ask_before_generating_advanced: true
  ai_must_ask_before_generating_optional: true
  ai_must_ask_before_generating_industry_specific: true
  ai_must_avoid_duplicates: true
  ai_must_use_tokens: true
  ai_must_use_auto_layout: true
  ai_must_document_components: true
  ai_must_run_self_audit: true

priority_levels:
  - core
  - advanced
  - optional
  - industry_specific

maturity_levels:
  1: "Startup MVP"
  2: "Growth Product"
  3: "Enterprise Product"
  4: "Platform Ecosystem"
  5: "Design Organization"

platforms:
  - desktop
  - responsive_web
  - tablet
  - mobile
  - admin_dashboard

variant_dimensions:
  - type
  - size
  - state
  - theme
  - density
  - icon
  - layout
  - platform

density:
  - compact
  - comfortable
  - spacious

component_requirements:
  every_component_must_have:
    - auto_layout
    - variables
    - component_properties
    - nested_components
    - responsive_resizing
    - variants
    - states
    - sizes
    - usage_notes
    - accessibility_notes
    - do_dont_examples
    - token_references
    - documentation

generation_flow:
  - read_ai_design_library_spec
  - read_project_config
  - read_project_tokens
  - read_component_registry
  - load_required_registry_files
  - ask_project_discovery_questions
  - determine_maturity_level
  - generate_foundations
  - generate_core_components
  - ask_before_advanced_generation
  - ask_before_industry_specific_generation
  - generate_selected_extensions
  - document_components
  - run_self_audit
  - report_missing_items

self_audit:
  required_checks:
    - all_core_components_generated
    - all_required_components_documented
    - all_components_use_tokens
    - all_components_use_auto_layout
    - all_components_have_responsive_behavior
    - all_components_have_accessibility_notes
    - no_duplicate_components
    - no_unjustified_industry_components
    - no_hardcoded_visual_values
    - atomic_design_hierarchy_respected
    - component_priority_assigned
    - maturity_level_coverage_checked